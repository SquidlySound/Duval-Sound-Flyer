name: Update archive.json

on:
  push:
    paths:
      - 'archive/**'

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate archive.json sorted by upload date (newest first)
        run: |
          python3 -c "
          import os, json, subprocess

          archive_dir = 'archive'
          supported = {'.png', '.jpg', '.jpeg', '.gif', '.webp', '.mp4', '.webm', '.mov'}

          if not os.path.isdir(archive_dir):
              files = []
          else:
              files_with_dates = []
              for f in os.listdir(archive_dir):
                  if os.path.splitext(f)[1].lower() not in supported:
                      continue
                  filepath = os.path.join(archive_dir, f)
                  result = subprocess.run(
                      ['git', 'log', '--follow', '--format=%aI', '--', filepath],
                      capture_output=True, text=True
                  )
                  dates = result.stdout.strip().split('\n')
                  first_committed = dates[-1] if dates and dates[-1] else '1970-01-01T00:00:00+00:00'
                  files_with_dates.append((f, first_committed))

              files_with_dates.sort(key=lambda x: x[1], reverse=True)
              files = [f for f, _ in files_with_dates]

          with open('archive.json', 'w') as out:
              json.dump(files, out, indent=2)

          print('Generated archive.json (' + str(len(files)) + ' files):')
          for f in files:
              print('  ' + f)
          "

      - name: Commit archive.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive.json
          git diff --staged --quiet || git commit -m "Auto-update archive.json"
          git push
